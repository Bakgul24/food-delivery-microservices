services:
  mongodb:
    image: mongo:7
    container_name: mini-yemeksepeti-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: mini-yemeksepeti-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  mongo-data: